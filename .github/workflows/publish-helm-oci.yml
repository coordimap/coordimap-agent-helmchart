name: Publish Helm chart to OCI

on:
  push:
    tags:
      - "chart-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Verify tag matches chart version
        if: startsWith(github.ref, 'refs/tags/chart-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#chart-v}"
          CHART_VERSION=$(helm show chart ./charts/agent | awk '/^version:/ { print $2 }')

          if [ "${TAG_VERSION}" != "${CHART_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match chart version (${CHART_VERSION})."
            exit 1
          fi

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Lint chart
        run: helm lint ./charts/agent

      - name: Package chart
        run: helm package ./charts/agent --destination .dist

      - name: Push chart to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC=$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')
          helm push .dist/coordimap-agent-*.tgz "oci://ghcr.io/${OWNER_LC}/charts"

      - name: Push Artifact Hub metadata
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC=$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')
          oras push \
            "ghcr.io/${OWNER_LC}/charts/coordimap-agent:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

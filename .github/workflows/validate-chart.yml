name: Validate Helm chart

on:
  pull_request:
    paths:
      - "charts/agent/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "charts/agent/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint chart
        run: helm lint ./charts/agent

      - name: Verify chart version changed
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          CURRENT_VERSION=$(helm show chart ./charts/agent | awk '/^version:/ { print $2 }')
          BASE_VERSION=$(git show "${BASE_REF}:charts/agent/Chart.yaml" | awk '/^version:/ { print $2 }')

          if git diff --quiet "${BASE_REF}" -- charts/agent; then
            echo "No chart changes detected."
            exit 0
          fi

          if [ "${CURRENT_VERSION}" = "${BASE_VERSION}" ]; then
            echo "Chart files changed but version did not change."
            echo "Current version: ${CURRENT_VERSION}"
            echo "Base version: ${BASE_VERSION}"
            exit 1
          fi

          echo "Chart version changed from ${BASE_VERSION} to ${CURRENT_VERSION}."
